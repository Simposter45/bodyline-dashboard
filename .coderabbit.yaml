# CodeRabbit Configuration
# Documentation: https://docs.coderabbit.ai/

language: "en-US"

reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  poetic_summary: false
  auto_review:
    enabled: true
    draft: false

tools:
  oxlint:
    enabled: true
  ast-grep:
    enabled: true

# Add your project context files here
knowledge_base:
  code_guidelines:
    filePatterns:
      - "**/AGENTS.md"
      - "**/CONTEXT_HANDOFF.md"
      - "**/MIGRATION_PROGRESS.md"
